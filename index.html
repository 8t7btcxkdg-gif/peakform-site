<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch — Be the glitch in the system.</title>
<style>
  :root { --bg:#080810; --accent:#c8f542; --text:#eeeef5; --muted:#9a9ab0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
  h1 { font-size:48px; font-weight:700; letter-spacing:2px; margin-bottom:12px; }
  h1 span { color:var(--accent); }
  .tag { color:var(--accent); font-size:16px; letter-spacing:1px; text-transform:uppercase; margin-bottom:20px; font-weight:600; }
  .sub { color:var(--muted); font-size:16px; line-height:1.6; max-width:520px; margin-bottom:40px; }
  .sub em { color:var(--text); font-style:normal; }
  .links { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; }
  a { color:var(--accent); text-decoration:none; font-size:15px; border:1px solid rgba(200,245,66,0.3); padding:10px 24px; border-radius:100px; transition:all 0.2s; }
  a:hover { background:rgba(200,245,66,0.1); }
</style>
</head>
<body>
  <h1>GL<span>ITCH</span></h1>
  <div class="tag">Be the glitch in the system.</div>
  <p class="sub">Training so dialed your physique looks like <em>a bug in the code</em>. Your AI coach bypasses the limits the rest of the system plays by.</p>
  <div class="links">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
    <a href="/support.html">Support</a>
  </div>
</body>
</html>
